<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>关于我 - Adam's Space</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      min-height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
      background: #ffffff; color: #37352f; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .page { max-width: 720px; margin: 0 auto; padding: 80px 24px 60px; }
    .breadcrumb {
      font-size: 13px; color: #787774; margin-bottom: 24px;
    }
    .breadcrumb a { color: #787774; text-decoration: none; }
    .breadcrumb a:hover { color: #37352f; }
    .cover { font-size: 64px; margin-bottom: 12px; }
    .page-title { font-size: 36px; font-weight: 700; color: #37352f; margin-bottom: 32px; letter-spacing: -0.5px; }
    .section-title {
      font-size: 18px; font-weight: 600; color: #37352f;
      margin: 32px 0 12px; display: flex; align-items: center; gap: 8px;
    }
    .section-title .icon { font-size: 20px; }
    .content { font-size: 15px; color: #37352f; line-height: 1.8; }
    .content p { margin-bottom: 12px; }
    .divider { height: 1px; background: #e8e7e4; margin: 32px 0; }
    .info-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    .info-table td {
      padding: 10px 12px; border-bottom: 1px solid #f1f1ef; font-size: 14px;
    }
    .info-table td:first-child { color: #787774; width: 100px; }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .tag {
      font-size: 12px; padding: 4px 10px; border-radius: 4px;
      background: #f1f1ef; color: #55534e; font-weight: 500;
    }
    @media (max-width: 600px) {
      .page { padding: 48px 20px 40px; }
      .page-title { font-size: 28px; }
      .cover { font-size: 48px; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="breadcrumb"><a href="../">← Adam's Space</a></div>
  <div class="cover">👤</div>
  <h1 class="page-title">关于我</h1>

  <div class="content">
    <p>Hi，我是 Adam 👋</p>
    <p>目前在马来西亚吉隆坡生活和工作。喜欢探索城市、发现好吃的，也喜欢用技术解决生活中的小问题。</p>
  </div>

  <div class="divider"></div>

  <div class="section-title"><span class="icon">📋</span> 基本信息</div>
  <table class="info-table">
    <tr><td>📍 所在地</td><td>吉隆坡, 马来西亚</td></tr>
    <tr><td>💼 职业</td><td>—</td></tr>
    <tr><td>🌐 语言</td><td>中文 / English / Bahasa Melayu</td></tr>
  </table>

  <div class="divider"></div>

  <div class="section-title"><span class="icon">💡</span> 兴趣</div>
  <div class="tags">
    <span class="tag">🍜 美食探索</span>
    <span class="tag">💻 编程</span>
    <span class="tag">📷 摄影</span>
    <span class="tag">✈️ 旅行</span>
    <span class="tag">📖 阅读</span>
  </div>

  <div class="divider"></div>

  <p style="font-size:13px; color:#b4b4b0; text-align:center;">© 2025 Adam · Built with ❤️</p>
</div>

</body>
</html>
