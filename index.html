<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>吉隆坡美食地图</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }

    .app { display: flex; height: 100%; }

    /* 侧边栏 */
    .panel {
      width: 340px; min-width: 340px;
      height: 100%;
      background: #fff;
      border-right: 1px solid #e5e5e5;
      display: flex; flex-direction: column;
      transition: margin-left 0.25s ease;
      position: relative; z-index: 10;
    }
    .panel.collapsed { margin-left: -296px; }

    .panel-header {
      padding: 16px; border-bottom: 1px solid #eee; flex-shrink: 0;
    }
    .panel-header h1 { font-size: 18px; font-weight: 700; margin-bottom: 12px; }
    .panel-header input {
      width: 100%; height: 36px; border: 1px solid #ddd; border-radius: 8px;
      padding: 0 12px; font-size: 13px; outline: none;
    }
    .panel-header input:focus { border-color: #4285f4; box-shadow: 0 0 0 2px rgba(66,133,244,0.15); }
    .filters { display: flex; gap: 8px; margin-top: 8px; }
    .filters select {
      flex: 1; height: 32px; border: 1px solid #ddd; border-radius: 6px;
      font-size: 12px; padding: 0 8px; background: #fff;
    }

    .panel-list { flex: 1; overflow-y: auto; }

    .item {
      padding: 12px 16px; cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }
    .item:hover { background: #f8f9fa; }
    .item.active { background: #e8f0fe; border-left: 3px solid #4285f4; }
    .item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .item-name { font-size: 14px; font-weight: 600; line-height: 1.3; color: #1a1a1a; }
    .item-dist { font-size: 12px; color: #0d9488; font-weight: 700; white-space: nowrap; }
    .item-meta { font-size: 12px; color: #666; margin-top: 4px; }

    /* 点击展开的详情 */
    .item-detail {
      display: none; margin-top: 8px; padding-top: 8px;
      border-top: 1px solid #eee; font-size: 12px; color: #444;
    }
    .item.active .item-detail { display: block; }
    .item-detail .d-row { margin-bottom: 4px; }
    .item-detail .d-label { color: #999; display: inline-block; width: 45px; }
    .item-detail a {
      display: inline-block; margin-top: 6px; padding: 5px 12px;
      background: #4285f4; color: #fff; border-radius: 6px;
      text-decoration: none; font-size: 12px; font-weight: 600;
    }
    .item-detail a:hover { background: #3367d6; }

    /* 收缩按钮 */
    .toggle-btn {
      position: absolute; right: -28px; top: 50%;
      transform: translateY(-50%);
      width: 28px; height: 56px;
      background: #fff; border: 1px solid #e5e5e5; border-left: none;
      border-radius: 0 8px 8px 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #666; z-index: 11;
    }
    .toggle-btn:hover { background: #f5f5f5; }

    /* 地图区域 */
    .map-area { flex: 1; position: relative; }
    #gmap { width: 100%; height: 100%; background: #e8e4d8; }

    @media (max-width: 600px) {
      .app { flex-direction: column-reverse; }
      .panel { width: 100%; min-width: 100%; height: 45vh; border-right: none; border-top: 1px solid #e5e5e5; }
      .panel.collapsed { margin-left: 0; margin-bottom: -35vh; }
      .toggle-btn { display: none; }
      .map-area { height: 55vh; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="panel" id="panel">
    <button class="toggle-btn" id="toggleBtn">‹</button>
    <div class="panel-header">
      <h1>🍜 吉隆坡美食地图</h1>
      <input id="search" type="search" placeholder="搜索餐厅、区域、菜系..." />
      <div class="filters">
        <select id="catFilter"><option value="">全部菜系</option></select>
        <select id="sortBy">
          <option value="nearest">离我最近</option>
          <option value="rating">评分最高</option>
          <option value="name">按名称</option>
        </select>
      </div>
    </div>
    <div class="panel-list" id="list"></div>
  </div>
  <div class="map-area">
    <div id="gmap"></div>
  </div>
</div>

<script>
// ===== 餐厅数据 =====
const PLACES = [
  { id:"hong-kee-claypot", name:"Hong Kee claypot chicken rice", area:"Chinatown", category:"广东风味", price:"RM 20-40", rating:3.8, lat:3.1442773, lng:101.6987981 },
  { id:"shi-tian-claypot", name:"食添瓦煲鸡饭店", area:"Petaling Jaya", category:"鸡肉", price:"RM 1-20", rating:3.8, lat:3.06728, lng:101.6497283 },
  { id:"shi-yue-tian-claypot", name:"食越添瓦煲鸡饭", area:"Petaling Jaya", category:"鸡肉", price:"RM 1-20", rating:4.0, lat:3.0576996, lng:101.6376537 },
  { id:"new-ipoh-chicken-rice", name:"1977 New Ipoh Chicken Rice HQ", area:"Petaling Jaya", category:"中国风味", price:"RM 20-40", rating:3.9, lat:3.1068394, lng:101.6534213 },
  { id:"hai-bin-seafood", name:"海滨海鲜楼", area:"Petaling Jaya", category:"蟹类菜品", price:"RM 40-140", rating:4.1, lat:3.098136, lng:101.6756964 },
  { id:"heng-kee-bak-kut-teh", name:"興記肉骨茶", area:"Kepong", category:"中国风味", price:"RM 20-40", rating:4.1, lat:3.2139058, lng:101.6374145 },
  { id:"icc-pudu", name:"ICC Pudu", area:"Pudu", category:"小贩中心", price:"RM 1-20", rating:4.0, lat:3.1380809, lng:101.7143347 },
  { id:"nz-curry-house", name:"NZ咖喱屋", area:"KLCC", category:"印度穆斯林餐厅", price:"RM 1-20", rating:3.9, lat:3.1593572, lng:101.7096594 },
  { id:"burgerboss", name:"BurgerBoss", area:"Bukit Bintang", category:"小贩档口", price:"RM 1-20", rating:4.6, lat:3.1446405, lng:101.7071322 },
  { id:"friend-fries", name:"Friend Fries", area:"Bukit Bintang", category:"快餐", price:"RM 1-20", rating:4.8, lat:3.1474438, lng:101.7119593 },
  { id:"naughty-babe-dirty-duck", name:"Naughty Babe Dirty Duck", area:"Desa Sri Hartamas", category:"烧烤", price:"RM 40-120", rating:4.1, lat:3.162473, lng:101.649636 },
  { id:"craf-roasters-bbq", name:"Craf Roasters BBQ", area:"Kuala Lumpur", category:"烧烤", price:"RM 20-100", rating:4.6, lat:3.1852169, lng:101.6866302 },
  { id:"borenos-fried-chicken", name:"Borenos Fried Chicken", area:"Damansara Uptown", category:"快餐", price:"RM 20-40", rating:4.6, lat:3.1373968, lng:101.6233797 },
  { id:"al-amin-xinjiang", name:"Al-Amin 新疆风味餐厅", area:"Petaling Jaya", category:"清真风味", price:"RM 20-40", rating:4.2, lat:3.118503, lng:101.6287869 },
  { id:"mamas-bun-stewed-fish", name:"咱妈烀饼 Mama's Bun", area:"Petaling Jaya", category:"餐馆", price:"RM 40-60", rating:4.7, lat:3.1145863, lng:101.6107796 }
];

let selectedId = null;
let myLat = null, myLng = null;
let gmap, gmarkers = {}, userMarker = null, infoWindow = null;

// ===== Google Maps 初始化 =====
// 简洁地图样式：隐藏 POI、公交、细节，只保留主干道
const SIMPLE_STYLE = [
  { featureType: 'poi', stylers: [{ visibility: 'off' }] },
  { featureType: 'transit', stylers: [{ visibility: 'off' }] },
  { featureType: 'road.local', stylers: [{ visibility: 'simplified' }] },
  { featureType: 'road.local', elementType: 'labels', stylers: [{ visibility: 'off' }] },
  { featureType: 'landscape.man_made', stylers: [{ visibility: 'simplified' }] },
  { featureType: 'administrative.land_parcel', stylers: [{ visibility: 'off' }] },
  { featureType: 'water', elementType: 'labels', stylers: [{ visibility: 'off' }] }
];

let useSimpleMap = false;

function initMap() {
  gmap = new google.maps.Map(document.getElementById('gmap'), {
    center: { lat: 3.14, lng: 101.69 },
    zoom: 12,
    disableDefaultUI: true,
    zoomControl: true,
    gestureHandling: 'greedy',
    clickableIcons: false
  });

  infoWindow = new google.maps.InfoWindow();

  // 给每个餐厅放标记 - 用醒目的图钉样式
  PLACES.forEach((p, idx) => {
    const marker = new google.maps.Marker({
      position: { lat: p.lat, lng: p.lng },
      map: gmap,
      title: p.name,
      label: { text: String(idx + 1), color: '#fff', fontSize: '11px', fontWeight: '700' },
      icon: {
        path: 'M12 0C7.03 0 3 4.03 3 9c0 6.75 9 15 9 15s9-8.25 9-15c0-4.97-4.03-9-9-9z',
        fillColor: '#e74c3c',
        fillOpacity: 1,
        strokeColor: '#b91c1c',
        strokeWeight: 1,
        scale: 1.8,
        anchor: new google.maps.Point(12, 24),
        labelOrigin: new google.maps.Point(12, 9)
      }
    });
    marker.addListener('click', () => {
      selectedId = p.id;
      renderList();
      showInfo(p, marker);
    });
    gmarkers[p.id] = marker;
  });

  // 适配所有点
  const bounds = new google.maps.LatLngBounds();
  PLACES.forEach(p => bounds.extend({ lat: p.lat, lng: p.lng }));
  gmap.fitBounds(bounds, 50);

  // 地图样式切换按钮
  const styleBtn = document.createElement('button');
  styleBtn.id = 'mapStyleBtn';
  styleBtn.textContent = '简洁地图';
  styleBtn.style.cssText = 'position:absolute;right:14px;bottom:30px;z-index:1000;padding:8px 14px;background:#fff;border:1px solid #ddd;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.1);';
  document.querySelector('.map-area').appendChild(styleBtn);
  styleBtn.addEventListener('click', () => {
    useSimpleMap = !useSimpleMap;
    gmap.setOptions({ styles: useSimpleMap ? SIMPLE_STYLE : [] });
    styleBtn.textContent = useSimpleMap ? '标准地图' : '简洁地图';
  });

  // 尝试定位
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      myLat = pos.coords.latitude;
      myLng = pos.coords.longitude;
      userMarker = new google.maps.Marker({
        position: { lat: myLat, lng: myLng },
        map: gmap,
        title: '我的位置',
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 10,
          fillColor: '#4285f4',
          fillOpacity: 1,
          strokeColor: '#fff',
          strokeWeight: 3
        },
        zIndex: 1000
      });
      renderList();
    }, () => {}, { enableHighAccuracy: true, timeout: 8000 });
  }

  renderList();
}

function showInfo(p, marker) {
  const d = formatDist(dist(p));
  infoWindow.setContent(`<div style="font-size:13px;max-width:200px">
    <b>${esc(p.name)}</b><br>
    <span style="color:#666">${esc(p.area)} · ${esc(p.category)}</span><br>
    <span style="color:#0d9488;font-weight:700">${d}</span> · ★${p.rating}
  </div>`);
  infoWindow.open(gmap, marker);
}

function highlightMarker(id) {
  PLACES.forEach((p, idx) => {
    const m = gmarkers[p.id];
    if (p.id === id) {
      m.setIcon({
        path: 'M12 0C7.03 0 3 4.03 3 9c0 6.75 9 15 9 15s9-8.25 9-15c0-4.97-4.03-9-9-9z',
        fillColor: '#4285f4',
        fillOpacity: 1,
        strokeColor: '#1d4ed8',
        strokeWeight: 1.5,
        scale: 2.2,
        anchor: new google.maps.Point(12, 24),
        labelOrigin: new google.maps.Point(12, 9)
      });
      m.setLabel({ text: String(idx + 1), color: '#fff', fontSize: '12px', fontWeight: '700' });
      m.setZIndex(999);
    } else {
      m.setIcon({
        path: 'M12 0C7.03 0 3 4.03 3 9c0 6.75 9 15 9 15s9-8.25 9-15c0-4.97-4.03-9-9-9z',
        fillColor: '#e74c3c',
        fillOpacity: 1,
        strokeColor: '#b91c1c',
        strokeWeight: 1,
        scale: 1.8,
        anchor: new google.maps.Point(12, 24),
        labelOrigin: new google.maps.Point(12, 9)
      });
      m.setLabel({ text: String(idx + 1), color: '#fff', fontSize: '11px', fontWeight: '700' });
      m.setZIndex(1);
    }
  });
}

// ===== 侧边栏逻辑 =====
const panel = document.getElementById('panel');
const toggleBtn = document.getElementById('toggleBtn');
const searchInput = document.getElementById('search');
const catFilter = document.getElementById('catFilter');
const sortBy = document.getElementById('sortBy');
const listEl = document.getElementById('list');

// 填充菜系
const cats = [...new Set(PLACES.map(p => p.category))].sort();
cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catFilter.appendChild(o); });

toggleBtn.addEventListener('click', () => {
  panel.classList.toggle('collapsed');
  toggleBtn.textContent = panel.classList.contains('collapsed') ? '›' : '‹';
});

searchInput.addEventListener('input', renderList);
catFilter.addEventListener('change', renderList);
sortBy.addEventListener('change', renderList);

function renderList() {
  const q = searchInput.value.trim().toLowerCase();
  const cat = catFilter.value;
  const sort = sortBy.value;

  let items = PLACES.filter(p => {
    if (cat && p.category !== cat) return false;
    if (q && !(p.name.toLowerCase().includes(q) || p.area.toLowerCase().includes(q) || p.category.toLowerCase().includes(q))) return false;
    return true;
  });

  if (sort === 'nearest') items.sort((a, b) => dist(a) - dist(b));
  else if (sort === 'rating') items.sort((a, b) => (b.rating||0) - (a.rating||0));
  else items.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));

  listEl.innerHTML = items.map(p => {
    const active = p.id === selectedId ? ' active' : '';
    const d = formatDist(dist(p));
    return `<div class="item${active}" data-id="${p.id}">
      <div class="item-top">
        <span class="item-name">${esc(p.name)}</span>
        <span class="item-dist">${d}</span>
      </div>
      <div class="item-meta">${esc(p.area)} · ${esc(p.category)} · ★${p.rating||'-'} · ${esc(p.price)}</div>
      <div class="item-detail">
        <div class="d-row"><span class="d-label">价格</span>${esc(p.price)}</div>
        <div class="d-row"><span class="d-label">评分</span>★ ${p.rating||'无'}</div>
        <div class="d-row"><span class="d-label">区域</span>${esc(p.area)}</div>
        <a href="https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}" target="_blank" rel="noopener">在 Google Maps 打开</a>
      </div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      selectedId = (selectedId === id) ? null : id;
      renderList();
      if (selectedId) {
        const p = PLACES.find(x => x.id === selectedId);
        if (p && gmap) {
          gmap.panTo({ lat: p.lat, lng: p.lng });
          gmap.setZoom(15);
          showInfo(p, gmarkers[p.id]);
        }
      } else {
        if (infoWindow) infoWindow.close();
      }
      highlightMarker(selectedId);
    });
  });

  highlightMarker(selectedId);
}

// ===== 工具函数 =====
function dist(p) {
  if (myLat == null) return Infinity;
  const R = 6371, dLat = (p.lat-myLat)*Math.PI/180, dLng = (p.lng-myLng)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(myLat*Math.PI/180)*Math.cos(p.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function formatDist(km) {
  if (!isFinite(km)) return '—';
  return km < 1 ? Math.round(km*1000)+' m' : km.toFixed(1)+' km';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>

<!-- Google Maps API -->
<script>
(function() {
  var s = document.createElement('script');
  s.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyCQfnrSZ-a8j5alavgI_i1qkLWFfX3A9mM&callback=initMap&region=MY&language=zh-CN';
  s.async = true;
  s.defer = true;
  document.head.appendChild(s);
})();
</script>

</body>
</html>
